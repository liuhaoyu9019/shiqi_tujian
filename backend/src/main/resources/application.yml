server:
  port: 8080

spring:
  application:
    name: blindbox-server
  datasource:
    url: jdbc:mysql://localhost:3306/blindbox?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:blindbox}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 后台管理Token
admin:
  token: ${ADMIN_TOKEN:admin-token-change-me}

logging:
  level:
    com.blindbox: ${LOG_LEVEL:INFO}
